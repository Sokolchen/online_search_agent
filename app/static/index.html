<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ken Masters · 智能助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .chat-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .message-content {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.user .message-content {
            background: #e74c3c;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #f1f3f5;
            color: #2c3e50;
            border-bottom-left-radius: 4px;
        }
        .message-label {
            font-size: 0.75rem;
            margin-bottom: 4px;
            color: #7f8c8d;
            padding-left: 8px;
        }
        .chat-input-area {
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }
        #messageInput:focus {
            border-color: #e74c3c;
        }
        #sendButton {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #sendButton:hover {
            background: #c0392b;
        }
        #sendButton:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: #f1f3f5;
            border-radius: 18px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #95a5a6;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thread-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
        }
        #threadIdInput {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            width: 180px;
        }
        #threadIdInput::placeholder {
            color: rgba(255,255,255,0.7);
        }
        #newThreadBtn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>
            <span>🔥</span> Ken Masters <span>🥊</span>
        </h1>
        <p>力量，是用来保护所爱之人的。</p>
        <div class="thread-info">
            <span>会话 ID:</span>
            <input type="text" id="threadIdInput" placeholder="输入或留空自动生成" value="">
            <button id="newThreadBtn">新对话</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <!-- 消息会动态添加到这里 -->
        <div class="message assistant">
            <div class="message-label">Ken Masters</div>
            <div class="message-content">
                嘿！我是 Ken Masters，也是你的智能助手。<br>
                有什么我可以帮你的吗？
            </div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="输入你的问题..." autocomplete="off">
        <button id="sendButton">发送</button>
    </div>
</div>

<script>
    (function() {
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const threadIdInput = document.getElementById('threadIdInput');
        const newThreadBtn = document.getElementById('newThreadBtn');

        // 生成随机 thread_id
        function generateThreadId() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            // 基本时间前缀：2026-04-10 19:21
            const timePrefix = `${year}-${month}-${day} ${hours}:${minutes}`;

            // 添加 4 位随机字符防止同一分钟内冲突
            const randomSuffix = Math.random().toString(36).substring(2, 6);

            return `${timePrefix}-${randomSuffix}`;
}

        // 初始化 thread_id（如果输入框为空则自动生成）
        if (!threadIdInput.value.trim()) {
            threadIdInput.value = generateThreadId();
        }

        // 新建对话
        newThreadBtn.addEventListener('click', () => {
            threadIdInput.value = generateThreadId();
            // 清空聊天记录（保留欢迎语）
            messagesContainer.innerHTML = `
                <div class="message assistant">
                    <div class="message-label">Ken Masters</div>
                    <div class="message-content">
                        嘿！我是 Ken Masters,你的智能助手.<br>
                        有什么我可以帮你的吗？
                    </div>
                </div>
            `;
        });

        // 添加一条用户消息到界面
        function addUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `
                <div class="message-label">你</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            messagesContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        // 创建一个助手消息占位符，返回用于流式更新的元素
        function createAssistantMessagePlaceholder() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.innerHTML = `
                <div class="message-label">Ken Masters</div>
                <div class="message-content" id="streamingContent"></div>
            `;
            messagesContainer.appendChild(msgDiv);
            scrollToBottom();
            return msgDiv.querySelector('.message-content');
        }

        // 简单的转义，防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 滚动到底部
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-label">Ken Masters</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
        }

        // 移除打字指示器
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // 发送消息（流式）
        async function sendMessage() {
            const userMessage = messageInput.value.trim();
            if (!userMessage) return;

            // 禁用输入
            messageInput.disabled = true;
            sendButton.disabled = true;

            // 显示用户消息
            addUserMessage(userMessage);
            messageInput.value = '';

            // 显示打字效果
            showTypingIndicator();

            const threadId = threadIdInput.value.trim() || generateThreadId();
            if (!threadIdInput.value.trim()) {
                threadIdInput.value = threadId;
            }

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: userMessage,
                        thread_id: threadId
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error ${response.status}`);
                }

                // 移除打字指示器，创建真正的消息容器
                removeTypingIndicator();
                const contentElement = createAssistantMessagePlaceholder();
                let fullText = '';

                // 处理 SSE 流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || ''; // 保留不完整的行

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;

                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    fullText += parsed.content;
                                    contentElement.innerHTML = formatContent(fullText);
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.warn('解析流数据失败:', e, data);
                            }
                        }
                    }
                }

                // 如果流结束但内容为空，显示默认提示
                if (!fullText) {
                    contentElement.innerHTML = '（助手没有返回内容）';
                }

            } catch (error) {
                console.error('发送消息失败:', error);
                removeTypingIndicator();
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message assistant';
                errorMsg.innerHTML = `
                    <div class="message-label">Ken Masters</div>
                    <div class="message-content" style="color: #e74c3c;">⚠️ 请求失败: ${escapeHtml(error.message)}</div>
                `;
                messagesContainer.appendChild(errorMsg);
            } finally {
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // 简单的 Markdown 风格格式化（粗体、换行）
        function formatContent(text) {
            // 将换行转换为 <br>
            let html = escapeHtml(text);
            html = html.replace(/\n/g, '<br>');
            // 简单的粗体支持 **text**
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return html;
        }

        // 绑定事件
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 聚焦输入框
        messageInput.focus();
    })();
</script>
</body>
</html>
